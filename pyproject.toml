[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"
[project]
name = "pypllr-gui"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.11"
license = {text = "MIT"}
authors = [
    {name = "Your Name", email = "your.email@example.com"}
]
dependencies = [
    "pyqt6>=6.9.1",
    "torch==2.8.0",
    "torchaudio==2.8.0",
    "pypllrcomputer @ git+https://github.com/BrainBehaviorAnalyticsLab/PyPLLRComputer.git@65a8e87",
    "wav2textgrid @ git+https://github.com/pkadambi/Wav2TextGrid.git@544287c",
    "datasets>=4.3.0",
    "accelerate>=1.11.0",
    "keyring>=25.6.0",
]
[project.urls]
Homepage = "https://github.com/yourusername/your-app-name"
Repository = "https://github.com/yourusername/your-app-name"
Issues = "https://github.com/yourusername/your-app-name/issues"

[tool.setuptools.packages.find]
where = ["src"]