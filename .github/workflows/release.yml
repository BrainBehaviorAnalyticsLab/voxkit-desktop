name: Release Build

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
      
      - name: Configure Git for private repos
        run: |
          git config --global url."https://x-access-token:${{ secrets.PRIVATE_REPO_TOKEN }}@github.com/".insteadOf "https://github.com/"
      
      - name: Install dependencies
        env:
          GIT_CREDENTIALS: ${{ secrets.PRIVATE_REPO_TOKEN }}
        run: |
          uv sync
      
      - name: Build .app bundle
        run: make build
      
      - name: Get version from tag
        id: get_version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"
      
      - name: Create DMG
        run: |
          # Create a simple DMG for easier distribution
          mkdir -p dmg_contents
          cp -R dist/VoxKit.app dmg_contents/
          hdiutil create -volname "VoxKit" -srcfolder dmg_contents -ov -format UDZO VoxKit.dmg
        continue-on-error: true
      
      - name: Zip .app for release
        run: |
          cd dist
          zip -r VoxKit.app.zip VoxKit.app
          cd ..
      
      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.get_version.outputs.version }}
          release_name: VoxKit ${{ steps.get_version.outputs.version }}
          body: |
            **VoxKit Release ${{ steps.get_version.outputs.version }}**
            
            > Ready for Round of Testing

            🍎 **Platform:** macOS (Apple Silicon)

            Automated build from releases branch.

            ## Installation
            1. Download VoxKit-macOS.dmg
            2. Open the dmg file
            3. Move VoxKit.app to your Applications folder
            4. Open Terminal (you can right-click the Applications folder and select "New Terminal at Folder")
            5. Run  xattr -cr ../VoxKit.app
            - Why this step? macOS marks apps downloaded from the internet as "quarantined" and won't let you open them. This command removes that quarantine flag so you can launch VoxKit.
            - Without this, you'll get a security warning, and the app won't open.

            ## Workflow Setup
            <!-- Instructions for setting up VoxKit. -->
            
            ## System Requirements
            - macOS 15 or later
            - Apple Silicon Mac (M1, M2, M3, etc.)
            - Install MFA - https://montreal-forced-aligner.readthedocs.io/en/latest/getting_started.html
            
          draft: true
          prerelease: true
          generate_release_notes: true
      
      - name: Upload .app.zip to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./dist/VoxKit.app.zip
          asset_name: VoxKit-macOS.app.zip
          asset_content_type: application/zip
      
      - name: Upload DMG to Release (if created)
        if: success()
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./VoxKit.dmg
          asset_name: VoxKit-macOS.dmg
          asset_content_type: application/x-apple-diskimage
        continue-on-error: true
