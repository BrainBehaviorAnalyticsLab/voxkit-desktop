name: Tests (Ubuntu)

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Qt system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 \
            libgl1 \
            libglib2.0-0 \
            libdbus-1-3 \
            libxkbcommon0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-sync1 \
            libxcb-xfixes0 \
            libxcb-xinerama0 \
            libxcb-cursor0 \
            libfontconfig1 \
            libxkbcommon-x11-0 \
            xvfb

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Configure Git for private repos
        run: |
          git config --global url."https://x-access-token:${{ secrets.PRIVATE_REPO_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Install dependencies
        run: |
          uv sync

      - name: Run tests
        run: |
          xvfb-run -a uv run invoke run-tests

      - name: Run linting
        run: |
          uv run invoke lint-check
        continue-on-error: true

      - name: Run type checking
        run: |
          uv run invoke mypy-check
        continue-on-error: true
