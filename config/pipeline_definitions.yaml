# Pipeline Configuration
# Define the stackers to include in the pipeline and their order

pipeline:

  - id: "introduction"
    label: "Introduction"
    stacker_class: "MarkdownStacker"
    enabled: true
    markdown_content: |
      # Welcome ASU/WISCLab Team!
      Welcome to VoxKit, your comprehensive speech alignment and analysis toolkit designed for clinical speech pathology applications. This introduction provides an overview of the application's features and how to get started.
      # Key Features:
      - Train custom alignment models on your datasets
      - Generate accurate forced alignments using state-of-the-art engines
      - Extract Goodness of Pronunciation (GOP) scores for pronunciation assessment
      - Manage datasets and models through an intuitive interface
      # Welcome ASU/WISCLab Team!
      Welcome to VoxKit, your comprehensive speech alignment and analysis toolkit designed for clinical speech pathology applications. This introduction provides an overview of the application's features and how to get started.
      # Key Features:
      - Train custom alignment models on your datasets
      - Generate accurate forced alignments using state-of-the-art engines
      - Extract Goodness of Pronunciation (GOP) scores for pronunciation assessment
      - Manage datasets and models through an intuitive interface
      # Welcome ASU/WISCLab Team!
      Welcome to VoxKit, your comprehensive speech alignment and analysis toolkit designed for clinical speech pathology applications. This introduction provides an overview of the application's features and how to get started.
      # Key Features:
      - Train custom alignment models on your datasets
      - Generate accurate forced alignments using state-of-the-art engines
      - Extract Goodness of Pronunciation (GOP) scores for pronunciation assessment
      - Manage datasets and models through an intuitive interface
      # Welcome ASU/WISCLab Team!
      Welcome to VoxKit, your comprehensive speech alignment and analysis toolkit designed for clinical speech pathology applications. This introduction provides an overview of the application's features and how to get started.
      # Key Features:
      - Train custom alignment models on your datasets
      - Generate accurate forced alignments using state-of-the-art engines
      - Extract Goodness of Pronunciation (GOP) scores for pronunciation assessment
      - Manage datasets and models through an intuitive interface

    collapsible_sections:
      "References": "For more information, visit the [VoxKit Help Page](http://localhost:3000/help)."
      "About Voxkit": "VoxKit is a comprehensive speech alignment and analysis toolkit designed for clinical speech pathology applications. It offers tools for training acoustic models, generating forced alignments, and computing Goodness of Pronunciation (GOP) scores for speech assessment."
      "Abut GOP": "Goodness of Pronunciation (GOP) is a metric used to assess the quality of pronunciation in speech. It compares the acoustic features of spoken phonemes against expected realizations, providing a score that reflects pronunciation accuracy. Higher GOP scores indicate better pronunciation."

  - id: "training"
    label: "Ⓐ Train Aligners"
    stacker_class: "TrainingStacker"
    enabled: true
    collapsible_sections:
      "Step Instructions": "Train custom alignment models on your datasets"
      "Additional Info": "Training creates acoustic models that learn from your labeled audio data. This process can take several hours depending on dataset size and model complexity."
      "Requirements": "Ensure your dataset is properly formatted with aligned text transcriptions before beginning training."
      "Misc": "This is an example of an additional collapsible section."
    
  - id: "prediction"
    label: "Ⓑ Predict Alignments"
    stacker_class: "PredictionStacker"
    enabled: true
    collapsible_sections:
      "Step Instructions": "Generate forced alignments using trained models"
      "Additional Info": "Forced alignment automatically determines the precise timing of phonemes in your audio recordings. Select a trained model and dataset to begin alignment."
    
  - id: "pllr"
    label: "Ⓒ Extract GOP Scoring"
    stacker_class: "PLLRStacker"
    enabled: true
    collapsible_sections:
      "Step Instructions": "Compute Goodness of Pronunciation scores from alignments"
      "Additional Info": "GOP scores measure pronunciation quality by comparing acoustic features against expected phoneme realizations. Higher scores indicate better pronunciation accuracy."

# UI Configuration
ui:
  menu_max_width: 500
  animation_duration: 300  # milliseconds
  content_spacing: 20
